<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Creator - Enter Your Info</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <section>
      <form action="">
        <div class="fields">
          <label for="image-url">ImageURL</label>
          <input
            type="url"
            id="image-url"
            placeholder="Enter Your Image URL..."
            required
          />
        </div>
        <div class="fields">
          <label for="inp1">Name</label>
          <input id="inp1" type="text" placeholder="Enter Your Name..." required/>
        </div>
        <div class="fields">
          <label for="inp2">Email</label>
          <input id="inp2" type="text" placeholder="Enter Your Email..." required />
        </div>
        <button id="create-btn">Create Profile</button>
      </form>
      <hr />
    </section>
    <div class="card-layout">
      <div class="cards">
        
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
